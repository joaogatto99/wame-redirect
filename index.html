<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .loader {
      text-align: center;
      color: #555;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #25D366;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Redirecionando...</p>
  </div>

  <script>
    // ================================================
    // CONFIGURAÇÕES — edite apenas esta seção
    // ================================================
    var WHATSAPP_NUMBER  = "5521996546586";
    var WHATSAPP_MESSAGE = "Olá! Tenho interesse e gostaria de mais informações.";
    var MAKE_WEBHOOK_URL = "https://hook.us2.make.com/tnx84fadldraj31eta81qohc9u9kijde";
    // ================================================

    function getParams() {
      var params = {};
      var search = window.location.search.substring(1);
      if (!search) return params;
      search.split("&").forEach(function(pair) {
        var parts = pair.split("=");
        if (parts.length === 2) {
          params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1].replace(/\+/g, " "));
        }
      });
      return params;
    }

    function buildWhatsAppUrl() {
      var msg = WHATSAPP_MESSAGE;
      return "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(msg);
    }

    function sendToMake(data) {
      fetch(MAKE_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      }).catch(function() {});
    }

    function run() {
      var p = getParams();

      var tracked = {
        fbclid:       p.fbclid       || "",
        utm_source:   p.utm_source   || "meta",
        utm_medium:   p.utm_medium   || "cpc",
        utm_campaign: p.utm_campaign || "",
        utm_content:  p.utm_content  || "",
        utm_term:     p.utm_term     || "",
        page_url:     window.location.href
      };

      sendToMake(tracked);

      var waUrl = buildWhatsAppUrl();

      setTimeout(function() {
        window.location.href = waUrl;
      }, 500);
    }

    run();
  </script>
</body>
</html>
